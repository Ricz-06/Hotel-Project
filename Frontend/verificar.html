<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificación - Hotel Transilvania</title>
<link rel="stylesheet" href="verificar.css">
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#111827,#1f2937);
}

.card{
    width:420px;
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 20px 40px rgba(0,0,0,.3);
}

.logo{
    font-size:60px;
    margin-bottom:10px;
}

h2{
    color:#111827;
    margin-bottom:10px;
}

.descripcion{
    color:#6b7280;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:2px solid #e5e7eb;
    border-radius:10px;
    outline:none;
    transition:.3s;
}

input:focus{
    border-color:#2563eb;
}

.codigo{
    text-align:center;
    font-size:28px;
    letter-spacing:5px;
    font-weight:bold;
}

.btn-verificar{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

.btn-verificar:hover{
    transform:translateY(-2px);
    background:#1d4ed8;
}

/* MENSAJES */

.mensaje{
    margin-top:15px;
    padding:12px;
    border-radius:10px;
    opacity:0;
    transition:.4s;
}

.mensaje.success{
    background:#dcfce7;
    color:#166534;
}

.mensaje.error{
    background:#fee2e2;
    color:#991b1b;
}

/* REENVIAR */

.reenviar-box{
    margin-top:20px;
}

#contador{
    color:#6b7280;
    margin-bottom:10px;
}

.btn-reenviar{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#9ca3af;
    color:white;
    cursor:not-allowed;
}

</style>
</head>

<body>

<div class="card">

    <div class="logo">🏨</div>

    <h2>Verificar Cuenta</h2>

    <p class="descripcion">
        Introduce el código enviado a tu correo electrónico
    </p>

    <input
        type="email"
        id="correo"
        placeholder="Correo electrónico">

    <input
        type="text"
        id="codigo"
        class="codigo"
        maxlength="6"
        placeholder="123456">

    <button
        class="btn-verificar"
        onclick="verificar()">
        Verificar Cuenta
    </button>

    <div id="mensaje" class="mensaje"></div>

    <div class="reenviar-box">

        <p id="contador">
            Reenviar código en 60 segundos
        </p>

        <button
            id="btnReenviar"
            class="btn-reenviar"
            onclick="reenviarCodigo()"
            disabled>
            Reenviar Código
        </button>

    </div>

</div>

<script src="verificar.js"></script>

</body>
</html>
